name: library-e2e

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: library_test
    volumes:
      - pg_data_e2e:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: /app/bin/docker-entrypoint
    command: bundle exec rails s -b 0.0.0.0 -p 3000
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db/library_test
      RAILS_ENV: test
      SECRET_KEY_BASE: test_secret_key_base_replace_in_production_abcdefg12345678901234567890
      ALLOWED_ORIGINS: "http://localhost:5174,http://localhost:4173,http://localhost:3001"
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - bundle_cache_e2e:/usr/local/bundle
    stdin_open: true
    tty: true

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - node_modules_e2e:/app/node_modules

volumes:
  pg_data_e2e:
  bundle_cache_e2e:
  node_modules_e2e:
